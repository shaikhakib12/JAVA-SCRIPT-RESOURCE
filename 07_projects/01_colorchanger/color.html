<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Color Changing Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 5px;
            color: #f0f0f0;
        }

        p {
            margin-bottom: 30px;
            color: #aaa;
            font-size: 1.1rem;
        }

        .button {
            width: 100px;
            height: 100px;
            border: solid black 2px;
            display: inline-block;
        }

        .button:hover{
            background-color: #1a1a1a;
            color: white;
            cursor: pointer;
        }

        #box1{
            color: black;
            background-color: yellow;
            font-weight: bold;
        }
        #box2{
            color: black;
            background-color: pink;
            font-weight: bold;
        }
        #box3{
            color: white;
            background-color: blue;
            font-weight: bold;
        }
        #box4{
            color: black;
            background-color: white;
            font-weight: bold;
        }

       
    </style>
</head>
<body>

    <h1>CSS Color Shift</h1>
    <p>Hover over the blocks to shift colors. Click and hold to flash white!</p>
    <span class="button" id="box1">click me!!</span>
    <span class="button" id="box2">click me!!</span>
    <span class="button" id="box3">click me!!</span>
    <span class="button" id="box4">click me!!</span>
   

</body>
<script src="color.js"></script>
</html>

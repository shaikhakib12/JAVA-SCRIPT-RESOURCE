<!DOCTYPE html>
<html>
<head>
  <title>Simple BMI Calculator</title>
  
  <!-- 1. CSS goes inside the <style> tags -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }
    .calculator {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 250px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <!-- 2. HTML elements go in the <body> -->
  <div class="calculator">
    <h2>BMI Calculator</h2>
    
    <label>Weight (kg)</label>
    <input type="number" id="weight" placeholder="e.g., 70">
    
    <label>Height (cm)</label>
    <input type="number" id="height" placeholder="e.g., 170">
    
    <button onclick="calculate()">Calculate</button>
    
    <div id="result"></div>
  </div>

  <!-- 3. JavaScript goes inside the <script> tags -->
  <script>
    function calculate(){
      let  weight = document.getElementById("weight").value;
      let height = document.getElementById("height").value;

      if (weight > 0 && height > 0) {
        let heightInMeter = height / 100;

        let bmi = weight / (heightInMeter * heightInMeter);

        document.getElementById("result").innerText = ("BMI: " + bmi.toFixed(1))
      } else{
        document.getElementById("result").innerText = ("Enter a valid numbers")
      }

    }

  </script>

</body>
</html>

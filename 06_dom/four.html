<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript resource</title>
</head>
<body style="background-color: #212121; color: white;">
    <ul class="language">
        <li>javascript</li>
    </ul>
</body>
<script>

    // this is unoptimise code
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")

    // this is optimize code 
    function addOptiLanguage(langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }

    addOptiLanguage("golang")

    // Edit 

    const secondalang = document.querySelector("li:nth-child(2)")
    // secondalang.innerHTML = "Mojo" // this is unoptimise

    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secondalang.replaceWith(newli)

    // remove 

    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
    
</script>
</html>
